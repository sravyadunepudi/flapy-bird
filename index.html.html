<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Flappy Bird</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="game-container">

        <!-- Start Screen -->
        <div id="startScreen" class="screen">
            <h1>🐦 Flappy Bird</h1>
            <p>Press SPACE or TAP to Start</p>
            <button id="startBtn">Start Game</button>
        </div>

        <!-- Game Canvas -->
        <canvas id="gameCanvas" width="400" height="600"></canvas>

        <!-- Score -->
        <div id="scoreBoard">
            Score: <span id="score">0</span>
        </div>

        <!-- Game Over Screen -->
        <div id="gameOverScreen" class="screen hidden">
            <h2>Game Over!</h2>

            <p>
                Score:
                <span id="finalScore">0</span>
            </p>

            <p>
                Best Score:
                <span id="bestScore">0</span>
            </p>

            <button id="restartBtn">
                Play Again
            </button>
        </div>

    </div>

    <!-- Sound Effects -->
    <audio id="flapSound" preload="auto">
        <source src="sounds/flap.mp3" type="audio/mpeg">
    </audio>

    <audio id="scoreSound" preload="auto">
        <source src="sounds/score.mp3" type="audio/mpeg">
    </audio>

    <audio id="hitSound" preload="auto">
        <source src="sounds/hit.mp3" type="audio/mpeg">
    </audio>

    <!-- JavaScript -->
    <script src="script.js"></script>

</body>
</html>
